version: 1
script:
  
  # Remove any previous build
  - rm -rf AppDir | true
  - rm -rf appimage-build | true
  
  # Make usr and icons dirs
  - mkdir -p AppDir/usr/src
  
  # Copy the python application code into the AppDir
  - cp main.py model/ view/ presenter/ -t AppDir/usr/src -r

  # Copy the application icon to AppDir
  - mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps/
  - cp ./view/ui/assets/bluenauta.png AppDir/usr/share/icons/hicolor/256x256/apps/

  # Install application dependencies
  - python3 -m pip install --upgrade pip
  - python3 -m pip3 install --ignore-installed --prefix=/usr --root=AppDir -r ./requirements.txt


AppDir:
  path: ./AppDir

  app_info:
    id: com.github.R0land013.BlueNauta
    name: BlueNauta
    icon: bluenauta
    version: 0.1.0
    # Set the python executable as entry point
    exec: usr/bin/python3
    # Set the application main script path as argument. Use '$@' to forward CLI parameters
    exec_args: "$APPDIR/usr/src/main.py $@"

  apt:
    arch: amd64
    sources:
      - sourceline: 'deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ jammy main restricted universe multiverse'
        key_url: 'http://keyserver.ubuntu.com/pks/lookup?op=get&search=0x3b4fe6acc0b21f32'

    include:
      - python3
      - python-is-python3
      - python3-pkg-resources
      - python3-pyqt5
      - bash
      - perl
    exclude: []

  runtime:
    env:
      # Set python home
      # See https://docs.python.org/3/using/cmdline.html#envvar-PYTHONHOME
      PYTHONHOME: '${APPDIR}/usr/lib/python3.8'
      # Path to the site-packages dir or other modules dirs
      # See https://docs.python.org/3/using/cmdline.html#envvar-PYTHONPATH
      PYTHONPATH: '${APPDIR}/usr/local/lib/python3.8/dist-packages'

AppImage:
  sign-key: None
  arch: x86_64